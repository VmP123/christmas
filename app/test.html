<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="utf-8" />
  <title>Christmas - Testaa kenttä</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #eee;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    #header {
      background: #16213e;
      padding: 8px 16px;
      border-radius: 4px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 2px solid #e94560;
    }
    h1 {
      font-size: 16px;
      color: #e94560;
      margin: 0;
    }
    #closeBtn {
      background: #e94560;
      color: #fff;
      border: none;
      padding: 6px 14px;
      cursor: pointer;
      font-family: monospace;
      font-size: 12px;
      border-radius: 3px;
      font-weight: bold;
    }
    #closeBtn:hover {
      background: #ff5570;
    }
    #game-container {
      border: 3px solid #16213e;
      box-shadow: 0 0 20px rgba(233, 69, 96, 0.3);
      image-rendering: pixelated;
      background: #000;
    }
    #game-container canvas {
      display: block;
    }
    #status {
      margin-top: 12px;
      font-size: 13px;
      color: #888;
      text-align: center;
    }
    #info {
      margin-top: 16px;
      font-size: 11px;
      color: #555;
      text-align: center;
      max-width: 400px;
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>Kentän testaus</h1>
    <button id="closeBtn">← Palaa editoriin</button>
  </div>
  
  <div id="game-container"></div>
  
  <div id="status">Ladataan...</div>
  
  <div id="info">
    ← → Liiku • ↑ Hyppää • ESC Sulje
  </div>

  <script src="test-bundle.js"></script>
</body>
</html>
